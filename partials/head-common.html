<!-- Smart scroll : arrivée précise + clics ancres in-page -->
<script>
(function(){
  function navHeight(){ var n=document.getElementById('nav'); return n?n.offsetHeight:80; }
  function scrollPrecise(target, smooth){
    if(!target) return;
    var title = target.querySelector('h1,h2') || target;
    var top = title.getBoundingClientRect().top + window.pageYOffset - navHeight() - 16;
    if (smooth) window.scrollTo({top:top, behavior:'smooth'});
    else window.scrollTo(0, top);
  }
  // 1. Arrivée avec un hash : pas d'anim, scroll précis
  if (location.hash) {
    var html = document.documentElement;
    html.style.scrollBehavior = 'auto';
    function rescroll(){
      try { scrollPrecise(document.querySelector(location.hash), false); } catch(e){}
    }
    addEventListener('load', function(){
      rescroll();
      // Re-scroll après chargement des polices (Anton/Open Sans changent les hauteurs)
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function(){
          rescroll();
          setTimeout(function(){ html.style.scrollBehavior = ''; }, 100);
        });
      } else {
        setTimeout(function(){ rescroll(); html.style.scrollBehavior = ''; }, 250);
      }
    });
  }
  // 2. Clics in-page sur des ancres : smooth précis (override CSS imprécis)
  document.addEventListener('click', function(e){
    var a = e.target.closest('a[href*="#"]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href === '#') return;
    var parts = href.split('#');
    var path = parts[0], hashPart = parts[1];
    if (!hashPart) return;
    var currentFile = location.pathname.split('/').pop() || 'index.html';
    if (path && path !== '' && path !== currentFile) return;
    var target = document.getElementById(hashPart);
    if (!target) return;
    e.preventDefault();
    scrollPrecise(target, true);
    history.pushState(null, '', '#' + hashPart);
  });
})();
</script>
